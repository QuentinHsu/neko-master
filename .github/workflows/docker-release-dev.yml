name: Docker Release (dev)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional explicit tag (v1.2.3-dev.1 or 1.2.3-dev.1). Leave empty to auto-increment."
        required: false
        type: string
      bump:
        description: "Base version bump when tag is empty."
        required: false
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

env:
  DOCKERHUB_IMAGE: quentinhsu/neko-master

jobs:
  validate-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME}" != "dev" ]]; then
            echo "This workflow must be run from the dev branch." >&2
            exit 1
          fi

  prepare-release:
    needs: validate-branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      previous_tag: ${{ steps.version.outputs.previousTag }}
      base_version: ${{ steps.version.outputs.baseVersion }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Resolve release version
        id: version
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag || '' }}
          INPUT_BUMP: ${{ github.event.inputs.bump || 'auto' }}
        run: |
          set -euo pipefail
          node scripts/resolve-release-version.mjs \
            --channel dev \
            --tag "${INPUT_TAG}" \
            --bump "${INPUT_BUMP}" \
            --output github >> "$GITHUB_OUTPUT"

      - name: Apply release version
        shell: bash
        run: |
          set -euo pipefail
          node scripts/apply-release-version.mjs --version "${{ steps.version.outputs.version }}"

      - name: Update changelog
        shell: bash
        run: |
          set -euo pipefail
          node scripts/update-changelog.mjs \
            --version "${{ steps.version.outputs.version }}" \
            --fromRef "${{ steps.version.outputs.previousTag }}" \
            --toRef HEAD

      - name: Commit release metadata
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- package.json CHANGELOG.md; then
            echo "No release metadata changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "chore(release): dev ${{ steps.version.outputs.version }}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"

          if git ls-remote --tags origin "refs/tags/${tag}" | grep -q .; then
            echo "Tag ${tag} already exists on origin, reusing it."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${tag}"
          git push origin "${tag}"

  publish-docker:
    needs: prepare-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=dev
            type=raw,value=${{ needs.prepare-release.outputs.version }}
            type=raw,value=${{ needs.prepare-release.outputs.base_version }}-dev
          labels: |
            org.opencontainers.image.title=Neko Master
            org.opencontainers.image.description=Modern traffic analytics for edge gateways
            org.opencontainers.image.version=${{ needs.prepare-release.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-dev
          cache-to: type=gha,mode=max,scope=docker-dev
          platforms: linux/amd64,linux/arm64

  publish-release:
    needs: [prepare-release, publish-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Generate release notes
        shell: bash
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          node scripts/generate-release-notes.mjs \
            --version "${{ needs.prepare-release.outputs.version }}" \
            --tag "${{ needs.prepare-release.outputs.tag }}" \
            --previousTag "${{ needs.prepare-release.outputs.previous_tag }}" \
            --channel dev \
            --image "${{ env.DOCKERHUB_IMAGE }}" \
            --repository "${GITHUB_REPOSITORY}" \
            --output release.md

      - name: Publish GitHub prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.tag }}"
          title="Neko Master ${{ needs.prepare-release.outputs.version }}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release edit "${tag}" --title "${title}" --notes-file release.md --prerelease
          else
            gh release create "${tag}" --title "${title}" --notes-file release.md --prerelease
          fi
